name: Sync upstream

on:
  schedule:
    - cron: "37 2 * * *"
  workflow_dispatch:

permissions:
  actions: write
  contents: write

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout main
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.SYNC_UPSTREAM_TOKEN }}

      - name: Rebase main onto upstream
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git remote add upstream https://github.com/manaflow-ai/cmux.git
          git fetch upstream main

          BEFORE="$(git rev-parse HEAD)"
          UPSTREAM="$(git rev-parse upstream/main)"
          echo "Before: ${BEFORE}"
          echo "Upstream: ${UPSTREAM}"

          if ! git rebase upstream/main; then
            echo "Upstream rebase failed. Conflicted files:"
            git diff --name-only --diff-filter=U || true
            git rebase --abort || true
            exit 1
          fi

          AFTER="$(git rev-parse HEAD)"
          echo "After: ${AFTER}"

          if [ "$AFTER" != "$BEFORE" ]; then
            git push --force-with-lease origin HEAD:main
          else
            echo "main is already up to date with upstream/main"
          fi
